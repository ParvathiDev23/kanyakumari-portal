<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>My Dashboard | Kanyakumari Tourism</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script id="tailwind-config">
      tailwind.config = { theme: { extend: { colors: { "primary": "#003974", "secondary-container": "#fd8b00", "surface": "#f8f9fa", "on-surface-variant": "#424751" }, fontFamily: { "headline": ["Noto Serif"], "body": ["Manrope"] } } } }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        /* A simple loader class to hide content until we verify the user */
        #dashboardContent { display: none; } 
    </style>
</head>
<body class="bg-surface font-body text-[#191c1d]">

    <div id="loadingScreen" class="h-screen w-full flex flex-col items-center justify-center">
        <span class="material-symbols-outlined text-primary text-4xl animate-spin mb-4">refresh</span>
        <p class="text-on-surface-variant font-bold tracking-widest uppercase text-sm">Verifying Access...</p>
    </div>

    <div id="dashboardContent" class="flex h-screen overflow-hidden">
        
        <aside class="w-64 bg-white border-r border-gray-200 flex flex-col hidden md:flex">
            <div class="p-6 border-b border-gray-100">
                <a href="index.html" class="font-headline text-2xl font-bold text-primary">Kanyakumari</a>
            </div>
            <nav class="p-4 space-y-2 flex-grow">
                <a href="#" class="flex items-center gap-3 p-3 bg-primary/5 text-primary rounded-lg font-bold">
                    <span class="material-symbols-outlined">confirmation_number</span> My Tours
                </a>
                <a href="#" class="flex items-center gap-3 p-3 text-on-surface-variant hover:bg-gray-50 rounded-lg transition-colors">
                    <span class="material-symbols-outlined">favorite</span> Saved Places
                </a>
                <a href="#" class="flex items-center gap-3 p-3 text-on-surface-variant hover:bg-gray-50 rounded-lg transition-colors">
                    <span class="material-symbols-outlined">manage_accounts</span> Settings
                </a>
            </nav>
            <div class="p-4 border-t border-gray-100">
                <button id="logoutBtn" class="flex items-center gap-3 p-3 w-full text-red-600 hover:bg-red-50 rounded-lg transition-colors font-bold text-left">
                    <span class="material-symbols-outlined">logout</span> Log Out
                </button>
            </div>
        </aside>

        <main class="flex-grow p-8 md:p-12 overflow-y-auto">
            <header class="flex justify-between items-center mb-12">
                <div>
                    <h1 class="text-4xl font-headline font-bold text-primary mb-2">Welcome Back.</h1>
                    <p class="text-on-surface-variant">Logged in as: <span id="userEmailDisplay" class="font-bold text-primary"></span></p>
                </div>
                <a href="index.html" class="bg-white border border-gray-200 px-4 py-2 rounded-lg text-sm font-bold shadow-sm hover:shadow-md transition-shadow">
                    Return to Main Site
                </a>
            </header>

            <section>
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                    <span class="material-symbols-outlined text-secondary-container">local_activity</span> Upcoming Bookings
                </h2>
                
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col md:flex-row justify-between items-center gap-6">
                    <div class="flex items-center gap-6">
                        <div class="w-16 h-16 bg-primary/10 rounded-lg flex items-center justify-center shrink-0">
                            <span class="material-symbols-outlined text-primary text-3xl">wb_twilight</span>
                        </div>
                        <div>
                            <h3 class="font-bold text-lg text-primary">Sunrise Serenity Tour</h3>
                            <p class="text-sm text-on-surface-variant">Nov 20, 2024 • 2 Adults • 5:00 AM Slot</p>
                        </div>
                    </div>
                    <div class="flex gap-3 w-full md:w-auto">
                        <button class="flex-1 md:flex-none px-4 py-2 bg-gray-100 hover:bg-gray-200 text-on-surface-variant rounded-lg font-bold text-sm transition-colors">Modify</button>
                        <button class="flex-1 md:flex-none px-4 py-2 bg-primary text-white rounded-lg font-bold text-sm hover:opacity-90 transition-opacity flex items-center justify-center gap-2">
                            <span class="material-symbols-outlined text-sm">download</span> Ticket
                        </button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // --- PASTE YOUR SUPABASE KEYS HERE ---
        const SUPABASE_URL = 'https://kpsmvybneziqggcizspy.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtwc212eWJuZXppcWdnY2l6c3B5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMDUxMDcsImV4cCI6MjA5MDg4MTEwN30.8IF2XSBHWH0YCdruqtcXVeft8HfqtPI5qdGo4mqkEU8';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Function to check if the user is allowed here
        async function checkUser() {
            // Get the current session from Supabase
            const { data: { user }, error } = await supabase.auth.getUser();

            if (!user) {
                // If there is no user, they are not logged in! Kick them to login page.
                window.location.href = 'login.html';
            } else {
                // If they are logged in, hide the loading screen and show the dashboard
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('dashboardContent').style.display = 'flex';
                
                // Display their email in the UI
                document.getElementById('userEmailDisplay').innerText = user.email;
            }
        }

        // Run the check immediately when the page loads
        checkUser();

        // Handle Log Out
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = 'login.html'; // Send back to login after signing out
        });
    </script>
</body>
</html>
