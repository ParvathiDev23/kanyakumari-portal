<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Checkout | Kanyakumari</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Manrope:wght@400;700&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = { theme: { extend: { colors: { "primary": "#003974", "secondary-container": "#fd8b00", "on-secondary-container": "#603100" }, fontFamily: { "headline": ["Noto Serif"], "body": ["Manrope"] } } } }
    </script>
</head>
<body class="bg-[#f8f9fa] font-body">

<nav class="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-md shadow-sm">
    <div class="flex justify-between items-center px-12 py-6 max-w-screen-2xl mx-auto">
        <a href="index.html" class="font-headline text-2xl font-bold text-[#00509d]">Kanyakumari Secure Checkout</a>
        <a href="booking.html" class="text-sm font-bold text-gray-500 hover:text-primary">Cancel & Return</a>
    </div>
</nav>

<main class="pt-32 pb-24 px-12 max-w-screen-2xl mx-auto flex flex-col items-center">
    <h1 class="font-headline text-4xl text-primary font-bold mb-8">Select Payment Method</h1>
    
    <div class="bg-white p-10 rounded-xl shadow-lg w-full max-w-2xl">
        <div class="space-y-4">
            <input class="w-full p-4 bg-gray-50 border-none rounded-lg text-sm focus:ring-2 focus:ring-primary" placeholder="Card Number" type="text"/>
            <div class="grid grid-cols-2 gap-4">
                <input class="w-full p-4 bg-gray-50 border-none rounded-lg text-sm focus:ring-2 focus:ring-primary" placeholder="MM / YY" type="text"/>
                <input class="w-full p-4 bg-gray-50 border-none rounded-lg text-sm focus:ring-2 focus:ring-primary" placeholder="CVV" type="password"/>
            </div>
        </div>
        
        <a href="index.html" class="block mt-8 w-full text-center bg-secondary-container text-on-secondary-container py-5 rounded-lg font-bold text-xl hover:scale-[1.02] transition-all">
            Pay ₹5,048 Securely
        </a>
    </div>
</main>
</body>
</html>
