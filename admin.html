<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin Panel | Kanyakumari Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700&display=swap" rel="stylesheet"/>
</head>
<body class="bg-slate-50 font-['Manrope'] hidden" id="adminBody">

    <div class="min-h-screen flex">
        <aside class="w-64 bg-slate-900 text-white p-8 hidden md:block shrink-0">
            <h1 class="text-xl font-bold mb-12 text-blue-400">K-Portal Admin</h1>
            <nav class="space-y-4">
                <button onclick="switchTab('addVendor')" id="tab-addVendor" class="w-full text-left px-4 py-3 rounded-xl bg-blue-600 text-white font-bold transition-all">Add Vendor</button>
                <button onclick="switchTab('viewBookings')" id="tab-viewBookings" class="w-full text-left px-4 py-3 rounded-xl text-slate-400 hover:text-white hover:bg-slate-800 transition-all font-bold">View Bookings</button>
                
                <div class="pt-12 border-t border-slate-800 mt-12">
                    <a href="index.html" class="block text-slate-400 hover:text-white mb-6">View Live Site</a>
                    <button onclick="handleLogout()" class="block text-red-400">Logout</button>
                </div>
            </nav>
        </aside>

        <main class="flex-1 p-8 md:p-16 overflow-y-auto h-screen">
            
            <div id="section-addVendor" class="max-w-2xl mx-auto block">
                <header class="mb-12">
                    <h2 class="text-3xl font-bold text-slate-800">Add New Partner</h2>
                    <p class="text-slate-500">Add a hotel, rental service, or market stall to the directory.</p>
                </header>

                <form id="vendorForm" class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 space-y-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Vendor Name</label>
                        <input type="text" id="name" required class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Category</label>
                            <select id="category" class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none">
                                <option value="Stay">Stay</option>
                                <option value="Transport">Transport</option>
                                <option value="Market">Market</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Price Range</label>
                            <select id="price" class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none">
                                <option value="₹">₹ (Budget)</option>
                                <option value="₹₹">₹₹ (Mid)</option>
                                <option value="₹₹₹">₹₹₹ (Luxury)</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Image URL</label>
                        <input type="url" id="image" class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Contact Number</label>
                        <input type="text" id="contact" class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Short Description</label>
                        <textarea id="desc" rows="3" class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none"></textarea>
                    </div>
                    <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition-all">
                        Publish to Directory
                    </button>
                </form>
                <p id="status" class="mt-4 text-center font-bold"></p>
            </div>

            <div id="section-viewBookings" class="max-w-5xl mx-auto hidden">
                <header class="mb-12 flex justify-between items-end">
                    <div>
                        <h2 class="text-3xl font-bold text-slate-800">Recent Reservations</h2>
                        <p class="text-slate-500">Manage your tourist bookings and hotel reservations.</p>
                    </div>
                    <button onclick="fetchBookings()" class="text-sm font-bold text-blue-600 bg-blue-50 px-4 py-2 rounded-lg hover:bg-blue-100">
                        ↻ Refresh
                    </button>
                </header>

                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-200 text-xs uppercase tracking-wider text-slate-500">
                                <th class="p-4 font-bold">Date</th>
                                <th class="p-4 font-bold">Customer Email</th>
                                <th class="p-4 font-bold">Booking Details</th>
                                <th class="p-4 font-bold">Guests</th>
                                <th class="p-4 font-bold">Revenue</th>
                            </tr>
                        </thead>
                        <tbody id="bookingsTableBody" class="divide-y divide-slate-100">
                            </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <script>
        const SUPABASE_URL = 'https://kpsmvybneziqggcizspy.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtwc212eWJuZXppcWdnY2l6c3B5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMDUxMDcsImV4cCI6MjA5MDg4MTEwN30.8IF2XSBHWH0YCdruqtcXVeft8HfqtPI5qdGo4mqkEU8';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- SECURITY CHECK ---
        async function checkAuth() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const role = localStorage.getItem('portal_role');
            if (!user || role !== 'admin') {
                window.location.href = "admin-login.html"; 
            } else {
                document.getElementById('adminBody').classList.remove('hidden');
                fetchBookings(); // Load data immediately on success
            }
        }
        checkAuth();

        // --- TAB SWITCHING LOGIC ---
        function switchTab(tabName) {
            // Hide both sections
            document.getElementById('section-addVendor').classList.add('hidden');
            document.getElementById('section-viewBookings').classList.add('hidden');
            
            // Reset button styles
            document.getElementById('tab-addVendor').className = "w-full text-left px-4 py-3 rounded-xl text-slate-400 hover:text-white hover:bg-slate-800 transition-all font-bold";
            document.getElementById('tab-viewBookings').className = "w-full text-left px-4 py-3 rounded-xl text-slate-400 hover:text-white hover:bg-slate-800 transition-all font-bold";

            // Show selected section & highlight button
            document.getElementById(`section-${tabName}`).classList.remove('hidden');
            document.getElementById(`tab-${tabName}`).className = "w-full text-left px-4 py-3 rounded-xl bg-blue-600 text-white font-bold transition-all";
            
            if (tabName === 'viewBookings') {
                fetchBookings();
            }
        }

        // --- FETCH BOOKINGS FROM DATABASE ---
        async function fetchBookings() {
            const tbody = document.getElementById('bookingsTableBody');
            tbody.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-slate-400 animate-pulse">Loading reservations...</td></tr>';

            // Pull from Supabase
            const { data, error } = await supabaseClient
                .from('bookings')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-8 text-center text-red-500 font-bold">Error: ${error.message}</td></tr>`;
                return;
            }

            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-slate-400">No bookings have been made yet.</td></tr>';
                return;
            }

            // Generate HTML Rows
            tbody.innerHTML = data.map(b => `
                <tr class="hover:bg-slate-50 transition-colors">
                    <td class="p-4 text-sm font-bold text-slate-700">${b.tour_date || 'N/A'}</td>
                    <td class="p-4 text-sm text-slate-600">${b.user_email || 'Guest'}</td>
                    <td class="p-4">
                        <span class="block text-sm font-bold text-blue-800">${b.vendor_name || 'Sunrise Tour'}</span>
                        <span class="block text-xs text-slate-400">${b.time_slot !== 'N/A' ? b.time_slot : 'Local Booking'}</span>
                    </td>
                    <td class="p-4 text-sm font-bold text-slate-700">${b.guests || 1}</td>
                    <td class="p-4">
                        <span class="block text-sm font-bold ${b.total_price > 0 ? 'text-green-600' : 'text-orange-500'}">
                            ${b.total_price > 0 ? '₹' + b.total_price : 'Pay at Venue'}
                        </span>
                    </td>
                </tr>
            `).join('');
        }

        // --- SUBMIT VENDOR FORM ---
        document.getElementById('vendorForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('status');
            
            btn.innerText = "Processing...";
            btn.disabled = true;

            const { error } = await supabaseClient.from('vendors').insert([{
                name: document.getElementById('name').value,
                category: document.getElementById('category').value,
                price_range: document.getElementById('price').value,
                image_url: document.getElementById('image').value,
                contact: document.getElementById('contact').value,
                description: document.getElementById('desc').value
            }]);

            if (error) {
                status.innerText = "Error: " + error.message;
                status.className = "text-red-500 mt-4 text-center font-bold";
            } else {
                status.innerText = "Success! Vendor added.";
                status.className = "text-green-500 mt-4 text-center font-bold";
                document.getElementById('vendorForm').reset();
            }
            btn.innerText = "Publish to Directory";
            btn.disabled = false;
        });

        // --- LOGOUT ---
        async function handleLogout() {
            await supabaseClient.auth.signOut();
            localStorage.removeItem('portal_role');
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
