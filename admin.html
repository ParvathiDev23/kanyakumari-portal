<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Admin Panel | Kanyakumari Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700&display=swap" rel="stylesheet"/>
</head>
<body class="bg-slate-50 font-['Manrope'] hidden" id="adminBody">

    <div class="min-h-screen flex">
        <aside class="w-64 bg-slate-900 text-white p-8 hidden md:block">
            <h1 class="text-xl font-bold mb-12 text-blue-400">K-Portal Admin</h1>
            <nav class="space-y-6">
                <a href="#" class="block text-blue-400 font-bold">Add Vendor</a>
                <a href="index.html" class="block text-slate-400 hover:text-white">View Site</a>
                <button onclick="handleLogout()" class="block text-red-400 mt-20">Logout</button>
            </nav>
        </aside>

        <main class="flex-1 p-8 md:p-16">
            <div class="max-w-2xl mx-auto">
                <header class="mb-12">
                    <h2 class="text-3xl font-bold text-slate-800">Add New Partner</h2>
                    <p class="text-slate-500">Add a hotel, rental service, or market stall to the directory.</p>
                </header>

                <form id="vendorForm" class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 space-y-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Vendor Name</label>
                        <input type="text" id="name" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Category</label>
                            <select id="category" class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none">
                                <option value="Stay">Stay</option>
                                <option value="Transport">Transport</option>
                                <option value="Market">Market</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Price Range</label>
                            <select id="price" class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none">
                                <option value="₹">₹ (Budget)</option>
                                <option value="₹₹">₹₹ (Mid)</option>
                                <option value="₹₹₹">₹₹₹ (Luxury)</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Image URL (Unsplash Link)</label>
                        <input type="url" id="image" placeholder="https://images.unsplash.com/..." class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Contact Number/Info</label>
                        <input type="text" id="contact" placeholder="+91..." class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Short Description</label>
                        <textarea id="desc" rows="3" class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none"></textarea>
                    </div>

                    <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition-all">
                        Publish to Directory
                    </button>
                </form>
                <p id="status" class="mt-4 text-center font-bold"></p>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = 'https://kpsmvybneziqggcizspy.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtwc212eWJuZXppcWdnY2l6c3B5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMDUxMDcsImV4cCI6MjA5MDg4MTEwN30.8IF2XSBHWH0YCdruqtcXVeft8HfqtPI5qdGo4mqkEU8';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // SECURITY CHECK: Only let logged in users stay
        async function checkAuth() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) {
                window.location.href = "login.html"; // Redirect if not logged in
            } else {
                document.getElementById('adminBody').classList.remove('hidden');
            }
        }
        checkAuth();

        // FORM SUBMISSION
        const form = document.getElementById('vendorForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('status');
            
            btn.innerText = "Processing...";
            btn.disabled = true;

            const { error } = await supabase.from('vendors').insert([{
                name: document.getElementById('name').value,
                category: document.getElementById('category').value,
                price_range: document.getElementById('price').value,
                image_url: document.getElementById('image').value,
                contact: document.getElementById('contact').value,
                description: document.getElementById('desc').value
            }]);

            if (error) {
                status.innerText = "Error: " + error.message;
                status.className = "text-red-500 mt-4 text-center font-bold";
            } else {
                status.innerText = "Success! Vendor added to Markets page.";
                status.className = "text-green-500 mt-4 text-center font-bold";
                form.reset();
            }
            
            btn.innerText = "Publish to Directory";
            btn.disabled = false;
        });

        async function handleLogout() {
            await supabase.auth.signOut();
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
