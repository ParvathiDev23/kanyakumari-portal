<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Kanyakumari | Sunrise Serenity Tour Booking</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
      tailwind.config = { theme: { extend: { colors: { "primary": "#003974", "secondary-container": "#fd8b00", "surface": "#f8f9fa", "on-surface-variant": "#424751" }, fontFamily: { "headline": ["Noto Serif"], "body": ["Manrope"] } } } }
    </script>
    <style>.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }</style>
</head>
<body class="bg-surface font-body text-[#191c1d] overflow-x-hidden pt-24">

<nav class="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-md shadow-sm">
    <div class="flex justify-between items-center px-6 py-5 max-w-screen-2xl mx-auto">
        <a href="index.html" class="font-headline text-2xl font-bold text-primary">Kanyakumari</a>
        <a href="dashboard.html" class="font-bold text-sm text-primary hover:underline">My Dashboard</a>
    </div>
</nav>

<main class="p-6 md:p-12 max-w-4xl mx-auto mt-10">
    <div class="bg-white p-8 rounded-xl shadow-lg border border-gray-100">
        <h1 class="text-4xl text-primary font-bold mb-2 font-headline">Sunrise Serenity Tour</h1>
        <p class="text-on-surface-variant mb-8">Book your spot for the magical confluence of the three seas.</p>

        <form id="bookingForm" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold uppercase tracking-wider text-on-surface-variant mb-2">Select Date</label>
                    <input id="tourDate" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-4 focus:ring-2 focus:ring-primary" type="date" required/>
                </div>
                <div>
                    <label class="block text-sm font-bold uppercase tracking-wider text-on-surface-variant mb-2">Time Slot</label>
                    <select id="timeSlot" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-4 focus:ring-2 focus:ring-primary" required>
                        <option value="5:00 AM">5:00 AM - Sunrise Special</option>
                        <option value="9:00 AM">9:00 AM - Morning Tour</option>
                    </select>
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold uppercase tracking-wider text-on-surface-variant mb-2">Total Guests</label>
                    <input id="guestCount" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-4 focus:ring-2 focus:ring-primary" type="number" min="1" max="10" value="2" required/>
                </div>
                <div class="flex flex-col justify-end">
                    <p class="text-sm font-bold text-on-surface-variant">Estimated Total (₹2,500/person)</p>
                    <p class="text-3xl font-bold text-primary" id="priceDisplay">₹5,000</p>
                </div>
            </div>
            
            <p id="bookingMsg" class="text-center font-bold hidden"></p>

            <button type="submit" id="confirmBtn" class="w-full bg-secondary-container text-[#603100] py-5 rounded-lg font-bold text-lg hover:opacity-90 transition-opacity mt-8">
                Confirm Booking
            </button>
        </form>
    </div>
</main>

<script>
    const MY_URL = 'https://kpsmvybneziqggcizspy.supabase.co';
    const MY_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtwc212eWJuZXppcWdnY2l6c3B5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMDUxMDcsImV4cCI6MjA5MDg4MTEwN30.8IF2XSBHWH0YCdruqtcXVeft8HfqtPI5qdGo4mqkEU8';
    const db = window.supabase.createClient(MY_URL, MY_KEY);

    // Dynamic Price Calculator
    const guestInput = document.getElementById('guestCount');
    const priceDisplay = document.getElementById('priceDisplay');
    guestInput.addEventListener('input', () => {
        const guests = guestInput.value || 0;
        priceDisplay.innerText = `₹${(guests * 2500).toLocaleString()}`;
    });

    // Handle Form Submission
    document.getElementById('bookingForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('confirmBtn');
        const msg = document.getElementById('bookingMsg');
        
        btn.innerText = "Processing...";

        // 1. Verify the user is logged in
        const { data: { user } } = await db.auth.getUser();
        
        if (!user) {
            msg.innerText = "You must be logged in to book a tour!";
            msg.className = "text-center font-bold text-red-500 block";
            btn.innerText = "Confirm Booking";
            return;
        }

        // 2. Gather form data
        const date = document.getElementById('tourDate').value;
        const slot = document.getElementById('timeSlot').value;
        const guests = guestInput.value;
        const total = guests * 2500;

        // 3. Send to Supabase
        const { error } = await db.from('bookings').insert([
            { user_email: user.email, tour_date: date, time_slot: slot, guests: guests, total_price: total }
        ]);

        if (error) {
            msg.innerText = "Error saving booking: " + error.message;
            msg.className = "text-center font-bold text-red-500 block";
            btn.innerText = "Confirm Booking";
        } else {
            btn.style.backgroundColor = "green";
            btn.style.color = "white";
            btn.innerText = "Booking Confirmed! Redirecting...";
            setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
        }
    });
</script>
</body>
</html>
